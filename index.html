<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Laura ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background: radial-gradient(circle at top,#2a1a3f,#12091d 55%,#07040b);
    color:white;
    font-family:'Cormorant Garamond',serif;
    min-height: 100vh;
}

/* INTRO */
.intro{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    background:radial-gradient(circle,#2a1a3f,#0b0612);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    z-index:10;
    transition:opacity 1.2s ease, visibility 1.2s;
}

.intro-text{
    font-size:1.5rem;
    color:#f5e6a0;
    max-width:90%;
    opacity:0;
    transition:opacity 0.8s ease;
}

.intro-text.show{opacity:1;}

.start-btn{
    margin-top:25px;
    padding:12px 22px;
    border:none;
    border-radius:25px;
    background:#ffd700;
    color:#1a1a1a;
    font-weight:bold;
    cursor:pointer;
    display:none;
    font-size: 1.1rem;
    box-shadow: 0 0 15px rgba(255,215,0,0.4);
}

/* MAIN */
.container{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px 20px;
}

.titulo{font-family:'Cinzel',serif;color:#ffd700;font-size:2.2rem;}
.subtitulo{color:#f7d98c;margin-top:10px;}

.foto{
    margin-top:20px;
    width:100%;
    max-width:400px;
    border-radius:20px;
    border:2px solid rgba(255,215,0,.4);
    box-shadow:0 0 35px rgba(255,215,0,.25);
}

.mensaje{
    margin-top:20px;
    max-width:600px;
    padding:20px;
    border-radius:15px;
    background:rgba(255,255,255,.06);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color:#ffd700;
    font-size:1.7rem;
    min-height:100px;
    opacity:0;
    transition:opacity 0.8s ease;
}

.final{margin-top:20px;color:#f5e6a0;font-size:1.2rem;}

/* QUESTION */
.question{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    background:rgba(5,2,10,0.95);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    z-index:20;
}

.question h1{font-family:'Cinzel',serif; color:#ffd700; margin-bottom:10px;}
.question p{font-size:1.6rem; color:#fff;}

.btns{margin-top:25px;display:flex;gap:15px;flex-wrap:wrap;justify-content:center;}

.btns button{
    padding:12px 22px;
    border:none;
    border-radius:20px;
    font-weight:bold;
    cursor:pointer;
    font-size:1rem;
    transition: transform 0.2s;
}
.btns button:active{transform: scale(0.95);}

.si{background:#ffd700; color:#111;}
.no{background:#444;color:white;}
.think{background:#ddd;color:#111;}

.response{margin-top:25px;color:#ffd700;font-size:1.5rem;font-weight:bold;min-height:30px;}

/* HEARTS */
.corazon{
    position:fixed;
    bottom:-50px;
    color:#ff4d88;
    font-size:20px;
    animation:up linear forwards;
    pointer-events:none;
    z-index: 1;
}

@keyframes up{
    0%{transform:translateY(0) scale(0.8);opacity:0;}
    20%{opacity:0.8;}
    100%{transform:translateY(-110vh) scale(1.2);opacity:0;}
}

.fade-out{opacity:0; visibility:hidden;}
</style>
</head>

<body>

<div class="intro">
    <div id="introText" class="intro-text"></div>
    <button id="startBtn" class="start-btn" onclick="startAll()">Presiona aquí Lau ❤️</button>
</div>

<audio id="music" loop prefetch="auto">
    <source src="audio.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <div class="titulo">👑 Laura 👑</div>
    <div class="subtitulo">La princesa de mis pensamientos ✨</div>

    <img src="laura.jpg" class="foto" alt="Laura">

    <div class="mensaje" id="msg"></div>

    <div class="final">Con amor, Bran ❤️</div>
</div>

<div class="question" id="question">
    <h1>💛 Laura 💛</h1>
    <p>¿Quieres ser mi novia?</p>

    <div class="btns">
        <button class="si" onclick="yes()">Sí ❤️</button>
        <button class="no" onclick="no()">No</button>
        <button class="think" onclick="think()">Lo pensaré 🤍</button>
    </div>

    <div class="response" id="response"></div>
</div>

<script>

/* INTRO CORREGIDA */
let lines = [
"Si el plan es hacer las cosas bien, hagámosla juntos.",
"Deja de huir por miedo a romperte o a romperme.",
"Te equivocas al decir que debo buscar a otra persona.",
"Mis pasos no buscan otro rumbo porque tú eres mi camino.",
"Elijo seguirte a todas partes el resto de mi vida."
];

let intro = document.getElementById("introText");
let btn = document.getElementById("startBtn");
let i = 0;

function playIntro(){
    if(i < lines.length){
        intro.classList.remove("show");

        setTimeout(()=>{
            intro.innerText = lines[i++];
            intro.classList.add("show");
            
            // Espera 3.5 segundos fija y luego vuelve a llamar a la función
            setTimeout(playIntro, 3500);
        },800);

    } else {
        intro.classList.remove("show");
        setTimeout(()=>{
            intro.style.display = "none";
            btn.style.display = "block";
        }, 800);
    }
}

// Iniciar intro al cargar la página
window.onload = () => {
    playIntro();
};

/* START */
function startAll(){
    document.querySelector(".intro").classList.add("fade-out");

    // Intenta reproducir música
    let audio = document.getElementById("music");
    audio.volume = 0.6;
    audio.play().catch(e => console.log("Audio bloqueado por el navegador"));

    startMain();
    
    // Generar corazones infinitos cada 300ms
    setInterval(createHeart, 300);
}

/* MAIN CORREGIDO */
let phrases = [
"Te mentiría si dijera que no pienso en ti...",
"porque estás en cada parte de mi mente.",
"y en cada silencio también apareces tú.",
"Laura... eres mi pensamiento favorito ❤️"
];

function startMain(){
    let msg = document.getElementById("msg");
    let index = 0;

    function next(){
        if(index < phrases.length){
            msg.style.opacity = 0;

            setTimeout(()=>{
                msg.innerText = phrases[index++];
                msg.style.opacity = 1;

                setTimeout(next, 3500);
            },800);

        } else {
            setTimeout(()=>{
                document.getElementById("question").style.display = "flex";
            }, 2000);
        }
    }

    next();
}

/* RESPUESTAS */
function yes(){
    let resp = document.getElementById("response");
    resp.style.display="block";
    resp.innerText="Sabía que dirías que sí ❤️ ¡Te amo!";
    // Multiplica los corazones al decir que sí
    for(let i=0; i<20; i++) createHeart();
}

function no(){
    let resp = document.getElementById("response");
    resp.style.display="block";
    resp.innerText="Está bien... aún así te seguiré eligiendo. ✨";
}

function think(){
    let resp = document.getElementById("response");
    resp.style.display="block";
    resp.innerText="Quédate con la pregunta, sientela, y dame tu respuesta cuando tu corazón hable🤍";
}

/* CORAZONES INFINITOS Y LIMPIOS */
function createHeart(){
    let c = document.createElement("div");
    c.className = "corazon";
    c.innerHTML = "❤";
    c.style.left = Math.random() * 100 + "vw";
    
    // Tamaños y velocidades aleatorias para verse más natural
    let duration = 4 + Math.random() * 5;
    let size = 12 + Math.random() * 15;
    
    c.style.animationDuration = duration + "s";
    c.style.fontSize = size + "px";
    
    document.body.appendChild(c);

    // IMPORTANTE: Eliminar el elemento cuando termine la animación para no congelar el celular/PC
    setTimeout(()=>{
        c.remove();
    }, duration * 1000);
}
</script>

</body>
</html>
