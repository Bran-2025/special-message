<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Laura ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background: radial-gradient(circle at top,#2a1a3f,#12091d 55%,#07040b);
    color:white;
    font-family:'Cormorant Garamond',serif;
    overflow:hidden;
}

/* ===== INTRO ===== */
.intro{
    position:fixed;
    width:100%;
    height:100vh;
    background:radial-gradient(circle,#2a1a3f,#0b0612);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    z-index:10;
    transition:opacity 1.2s ease;
}

.intro-text{
    font-size:1.3rem;
    color:#f5e6a0;
    max-width:90%;
    opacity:0;
    transition:opacity 1s ease;
}

.intro-text.show{
    opacity:1;
}

.start-btn{
    margin-top:25px;
    padding:12px 22px;
    border:none;
    border-radius:25px;
    background:#ffd700;
    color:#1a1a1a;
    font-weight:bold;
    cursor:pointer;
    display:none;
}

/* ===== MAIN ===== */
.container{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
}

.titulo{
    font-family:'Cinzel',serif;
    color:#ffd700;
    font-size:2.2rem;
}

.subtitulo{
    color:#f7d98c;
    margin-top:10px;
}

.foto{
    margin-top:20px;
    width:100%;
    max-width:600px;
    border-radius:20px;
    border:2px solid rgba(255,215,0,.4);
    box-shadow:0 0 35px rgba(255,215,0,.25);
}

.mensaje{
    margin-top:20px;
    max-width:600px;
    padding:20px;
    border-radius:15px;
    background:rgba(255,255,255,.06);
    backdrop-filter:blur(10px);
    color:#ffd700;
    font-size:1.7rem;
    min-height:100px;
    opacity:1;
    transition:opacity 0.8s ease;
}

.final{
    margin-top:20px;
    color:#f5e6a0;
}

/* ===== PREGUNTA FINAL ===== */
.question{
    display:none;
    position:fixed;
    width:100%;
    height:100vh;
    background:rgba(5,2,10,0.9);
    backdrop-filter: blur(10px);
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    z-index:20;
}

.question h1{
    color:#ffd700;
    font-size:2rem;
}

.question p{
    margin-top:15px;
    color:#f5e6a0;
    font-size:1.2rem;
}

.btns{
    margin-top:25px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
}

.btns button{
    padding:10px 18px;
    border:none;
    border-radius:20px;
    font-weight:bold;
    cursor:pointer;
}

.si{
    background:#ffd700;
    animation:pulse 1.5s infinite;
}

.no{
    background:#444;
    color:white;
}

.think{
    background:#ddd;
    color:#111;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

.response{
    margin-top:20px;
    color:#ffd700;
    font-size:1.2rem;
    display:none;
}

/* ===== EFECTOS ===== */
.fade-out{
    opacity:0;
}

.corazon{
    position:fixed;
    bottom:-50px;
    color:#ff4d88;
    font-size:20px;
    animation:up linear infinite;
    pointer-events:none;
}

@keyframes up{
    from{transform:translateY(0);opacity:0;}
    20%{opacity:1;}
    to{transform:translateY(-120vh);opacity:0;}
}

</style>
</head>

<body>

<!-- INTRO -->
<div class="intro">
    <div id="introText" class="intro-text"></div>
    <button id="startBtn" class="start-btn" onclick="startAll()">Presiona aquí Lau ❤️</button>
</div>

<!-- AUDIO -->
<audio id="music" loop>
    <source src="audio.mp3" type="audio/mpeg">
</audio>

<!-- MAIN -->
<div class="container">

    <div class="titulo">👑 Laura 👑</div>
    <div class="subtitulo">La princesa de mis pensamientos ✨</div>

    <img src="laura.jpg" class="foto">

    <div class="mensaje" id="msg"></div>

    <div class="final">Con amor, Bran ❤️</div>

</div>

<!-- QUESTION -->
<div class="question" id="question">

    <h1>💛 Laura 💛</h1>
    <p>¿Quieres ser mi novia?</p>

    <div class="btns">
        <button class="si" onclick="yes()">Sí ❤️</button>
        <button class="no" onclick="no()">No</button>
        <button class="think" onclick="think()">Lo pensaré 🤍</button>
    </div>

    <div class="response" id="response"></div>

</div>

<script>

/* ===== INTRO ===== */
let lines = [
"Si el plan es hacer las cosas bien, hagámosla juntos.",
"Deja de huir por miedo a romperte o a romperme.",
"Te equivocas al decir que debo buscar a otra persona.",
"Mis pasos no buscan otro rumbo porque tú eres mi camino.",
"Elijo seguirte a todas partes el resto de mi vida."
];

let intro = document.getElementById("introText");
let btn = document.getElementById("startBtn");

let i = 0;

function playIntro(){

    if(i < lines.length){

        intro.classList.remove("show");

        setTimeout(()=>{
            intro.innerText = lines[i];
            intro.classList.add("show");
            i++;
        },500);

        setTimeout(playIntro, 4200);

    } else {
        intro.innerText = "";
        btn.style.display = "block";
    }
}

playIntro();

/* ===== START ===== */
function startAll(){

    document.querySelector(".intro").classList.add("fade-out");

    setTimeout(()=>{
        document.querySelector(".intro").style.display="none";
    },1200);

    document.getElementById("music").play();

    startMain();
    hearts();
}

/* ===== MAIN TEXT ===== */
let phrases = [
"Te mentiría si dijera que no pienso en ti...",
"porque estás en cada parte de mi mente.",
"y en cada silencio también apareces tú.",
"Laura... eres mi pensamiento favorito ❤️"
];

let msg = document.getElementById("msg");
let j = 0;

function startMain(){

    function show(){
        msg.style.opacity = 0;

        setTimeout(()=>{
            msg.innerText = phrases[j % phrases.length];
            msg.style.opacity = 1;
            j++;
        },500);
    }

    show();
    setInterval(show, 4500);

    /* 🔥 PREGUNTA FINAL A LOS 10 SEGUNDOS */
    setTimeout(()=>{
        document.getElementById("question").style.display="flex";
    }, 10000);
}

/* ===== RESPUESTAS ===== */
function yes(){
    document.getElementById("response").style.display="block";
    document.getElementById("response").innerText="Sabía que dirías que sí ❤️";
}

function no(){
    document.getElementById("response").style.display="block";
    document.getElementById("response").innerText="Está bien... pero igual te elijo a ti.";
}

function think(){
    document.getElementById("response").style.display="block";
    document.getElementById("response").innerText="Quédate con la pregunta, siéntela, y dame tu respuesta cuando hable tu corazón 🤍";
}

/* ===== CORAZONES ===== */
function hearts(){
    for(let i=0;i<35;i++){
        let c=document.createElement("div");
        c.className="corazon";
        c.innerHTML="❤";
        c.style.left=Math.random()*100+"vw";
        c.style.animationDuration=(5+Math.random()*8)+"s";
        document.body.appendChild(c);
    }
}

</script>

</body>
</html>
