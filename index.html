<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Laura ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background: radial-gradient(circle at top,#2a1a3f,#12091d 55%,#07040b);
    color:white;
    font-family:'Cormorant Garamond',serif;
    overflow-x:hidden;
}

/* efecto entrada */
body{
    animation:fadeIn 2s ease;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

/* brillo fondo */
.brillo{
    position:fixed;
    width:3px;
    height:3px;
    background:#ffd700;
    border-radius:50%;
    box-shadow:0 0 12px #ffd700;
    animation:parpadeo 4s infinite;
}

@keyframes parpadeo{
    0%,100%{opacity:.2;}
    50%{opacity:1;}
}

/* corazones */
.corazon{
    position:fixed;
    bottom:-50px;
    color:#ff4d88;
    font-size:20px;
    animation:subir linear infinite;
    pointer-events:none;
}

@keyframes subir{
    from{transform:translateY(0);opacity:0;}
    20%{opacity:1;}
    to{transform:translateY(-120vh);opacity:0;}
}

/* contenedor */
.container{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:30px 15px;
    text-align:center;
}

/* título */
.titulo{
    font-family:'Cinzel',serif;
    color:#ffd700;
    font-size:2.2rem;
    text-shadow:0 0 25px rgba(255,215,0,.4);
}

.subtitulo{
    color:#f7d98c;
    margin-top:10px;
    font-size:1.1rem;
}

/* foto */
.foto{
    margin-top:25px;
    width:100%;
    max-width:650px;
    border-radius:25px;
    border:2px solid rgba(255,215,0,.4);
    box-shadow:0 0 40px rgba(255,215,0,.25);
    transition:transform 0.5s ease;
}

.foto:hover{
    transform:scale(1.02);
}

/* mensaje */
.mensaje{
    margin-top:25px;
    max-width:650px;
    padding:25px;
    border-radius:20px;

    background:rgba(255,255,255,.06);
    backdrop-filter:blur(10px);

    color:#ffd700;
    font-size:1.8rem;
    line-height:1.5;

    box-shadow:0 0 25px rgba(255,215,0,.15);
    min-height:120px;
}

/* final */
.final{
    margin-top:25px;
    color:#f5e6a0;
    font-size:1.2rem;
}

/* botón música */
.btn{
    margin-top:20px;
    padding:10px 18px;
    border:none;
    border-radius:20px;
    background:#ffd700;
    color:#1a1a1a;
    font-weight:bold;
    cursor:pointer;
}

</style>
</head>
<body>

<!-- música -->
<audio id="musica" loop>
    <source src="audio.mp3" type="audio/mpeg">
</audio>

<div class="container">

    <div class="titulo">👑 Laura 👑</div>
    <div class="subtitulo">La princesa de mis pensamientos ✨</div>

    <img src="laura.jpg" class="foto">

    <div class="mensaje" id="mensaje"></div>

    <div class="final">Con amor, Bran ❤️</div>

    <button class="btn" onclick="playMusic()">✨ Tocar para activar música</button>

</div>

<script>

/* música */
function playMusic(){
    document.getElementById("musica").play();
}

/* frases animadas */
let frases = [
"Te mentiría si dijera que no pienso en ti...",
"porque estás en cada parte de mi mente.",
"y en cada silencio también apareces tú.",
"Laura... eres mi pensamiento favorito ❤️"
];

let i = 0;
let msg = document.getElementById("mensaje");

function mostrarFrases(){
    msg.innerHTML = frases[i];
    i = (i + 1) % frases.length;
}

mostrarFrases();
setInterval(mostrarFrases, 3000);

/* corazones */
for(let i=0;i<35;i++){
    let c=document.createElement("div");
    c.className="corazon";
    c.innerHTML="❤";
    c.style.left=Math.random()*100+"vw";
    c.style.animationDuration=(5+Math.random()*8)+"s";
    c.style.animationDelay=Math.random()*10+"s";
    document.body.appendChild(c);
}

/* brillos */
for(let i=0;i<80;i++){
    let b=document.createElement("div");
    b.className="brillo";
    b.style.left=Math.random()*100+"vw";
    b.style.top=Math.random()*100+"vh";
    b.style.animationDelay=Math.random()*4+"s";
    document.body.appendChild(b);
}

</script>

</body>
</html>
