<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Laura ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#090909;
overflow:hidden;
color:white;
font-family:'Cormorant Garamond',serif;
}

#inicio,
#final{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:10;
background:linear-gradient(
135deg,
#050505,
#150b0b,
#2a0f0f
);
}

#inicio h1{
font-family:'Cinzel',serif;
font-size:4rem;
color:#d4af37;
letter-spacing:4px;
}

.subtitulo{
font-size:1.5rem;
margin-top:10px;
color:#d8c690;
}

#entrar{
margin-top:40px;
padding:18px 45px;
border:1px solid #d4af37;
background:transparent;
color:#d4af37;
font-size:1.1rem;
cursor:pointer;
border-radius:50px;
transition:.4s;
}

#entrar:hover{
background:#d4af37;
color:black;
}

#contenido{
display:none;
height:100vh;
position:relative;
}

#foto{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
inset:0;
background:
linear-gradient(
rgba(0,0,0,.25),
rgba(0,0,0,.65)
);
}

.texto{
position:relative;
z-index:3;
height:100%;
display:flex;
justify-content:center;
align-items:center;
padding:50px;
text-align:center;
}

#frase{
font-size:2rem;
max-width:900px;
line-height:1.7;
text-shadow:0 0 25px rgba(0,0,0,.9);
}

#pregunta{
display:none;
position:absolute;
inset:0;
z-index:5;
background:rgba(0,0,0,.75);
justify-content:center;
align-items:center;
flex-direction:column;
}

#pregunta h1{
font-family:'Cinzel',serif;
font-size:4rem;
color:#d4af37;
margin-bottom:30px;
}

.boton{
padding:18px 40px;
margin:10px;
border:none;
cursor:pointer;
font-size:1.1rem;
border-radius:50px;
}

.si{
background:#d4af37;
color:black;
}

.no{
background:#5e1111;
color:white;
}

.particula{
position:absolute;
width:3px;
height:3px;
background:#d4af37;
border-radius:50%;
opacity:.7;
animation:subir 8s linear infinite;
}

@keyframes subir{
from{
transform:translateY(100vh);
opacity:0;
}
50%{
opacity:1;
}
to{
transform:translateY(-100px);
opacity:0;
}
}

#final{
display:none;
}

#final h1{
font-size:4rem;
color:#d4af37;
font-family:'Cinzel',serif;
}

#final p{
font-size:2rem;
margin-top:20px;
}

</style>
</head>

<body>

<div id="inicio">

<h1>LAURA</h1>

<p class="subtitulo">
Hay personas que llegan a tu vida...
y cambian para siempre su significado.
</p>

<button id="entrar">
Abrir ❤️
</button>

</div>

<div id="contenido">

<img src="laura.jpg" id="foto">

<div class="overlay"></div>

<div class="texto">
<div id="frase"></div>
</div>

<div id="pregunta">

<h1>¿Quieres ser mi novia?</h1>

<div>

<button class="boton si" onclick="aceptar()">
Sí ❤️
</button>

<button class="boton no" id="no">
Necesito sentirlo un poco más
</button>

</div>

</div>

</div>

<div id="final">

<h1>❤️</h1>

<p>
Gracias por regalarme la oportunidad
de escribir nuestra historia.
</p>

<p style="margin-top:40px;">
Con amor, Bran
</p>

</div>

<audio id="audio" src="audio.mp3"></audio>

<script>

const frases = [

"Te mentiría si te dijera que no estás en cada uno de mis pensamientos.",

"Estás clavada en mi corazón, y sé que yo estoy en el tuyo.",

"Lo que tú y yo compartimos no pasa dos veces en la vida.",

"Después de tanto tiempo, nuestro reencuentro solo puede ser el destino.",

"Quiero algo real contigo.",

"Mis pasos no buscan otro rumbo porque tú eres mi camino.",

"Elijo seguirte a todas partes.",

"Mi amor por ti cruza cualquier distancia.",

"Siento el pecho estallar, pero tengo que decírtelo..."
];

let indice = 0;

document.getElementById("entrar").onclick = () => {

document.getElementById("inicio").style.display="none";
document.getElementById("contenido").style.display="block";

document.getElementById("audio").play();

mostrarFrase();

}

function mostrarFrase(){

if(indice < frases.length){

document.getElementById("frase").innerHTML =
frases[indice];

indice++;

setTimeout(mostrarFrase,5000);

}else{

document.getElementById("pregunta").style.display="flex";

}

}

function aceptar(){

document.getElementById("contenido").style.display="none";
document.getElementById("final").style.display="flex";

}

const btnNo = document.getElementById("no");

btnNo.addEventListener("mouseover",()=>{

btnNo.style.position="absolute";

btnNo.style.left =
Math.random()*(window.innerWidth-250)+"px";

btnNo.style.top =
Math.random()*(window.innerHeight-100)+"px";

});

for(let i=0;i<80;i++){

let p=document.createElement("div");

p.classList.add("particula");

p.style.left=Math.random()*100+"vw";
p.style.animationDelay=Math.random()*8+"s";

document.body.appendChild(p);

}

</script>

</body>
</html>
