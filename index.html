<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Laura ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
    radial-gradient(circle at top,#2d1b45,#12091d 50%,#090509);
    color:white;
    overflow-x:hidden;
    font-family:'Cormorant Garamond',serif;
}

/* BRILLOS */

.brillo{
    position:fixed;
    width:4px;
    height:4px;
    background:#ffd700;
    border-radius:50%;
    box-shadow:0 0 10px #ffd700;
    animation:parpadeo 3s infinite;
}

@keyframes parpadeo{
    0%,100%{opacity:.2;}
    50%{opacity:1;}
}

/* CORAZONES */

.corazon{
    position:fixed;
    bottom:-50px;
    color:#ff4d88;
    font-size:24px;
    animation:subir linear infinite;
    pointer-events:none;
}

@keyframes subir{
    from{
        transform:translateY(0);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

/* CONTENIDO */

.container{
    width:100%;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:30px 15px;
}

.titulo{
    font-family:'Cinzel',serif;
    color:#ffd700;
    font-size:2rem;
    text-align:center;
    margin-bottom:20px;
    text-shadow:0 0 20px rgba(255,215,0,.5);
}

.subtitulo{
    color:#f8d68f;
    text-align:center;
    font-size:1.2rem;
    margin-bottom:30px;
}

.foto{
    width:100%;
    max-width:700px;
    border-radius:25px;
    box-shadow:
    0 0 30px rgba(255,215,0,.3),
    0 0 60px rgba(255,215,0,.15);
}

.mensaje{
    max-width:700px;
    margin-top:25px;
    padding:25px;

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(10px);

    border-radius:20px;

    color:#ffd700;
    text-align:center;

    font-size:2rem;
    line-height:1.6;

    box-shadow:0 0 20px rgba(255,215,0,.15);
}

.final{
    margin-top:30px;
    text-align:center;
    color:#f7e6a2;
    font-size:1.3rem;
}

</style>
</head>
<body>

<audio autoplay loop>
    <source src="audio.mp3" type="audio/mpeg">
</audio>

<div class="container">

    <div class="titulo">
        👑 Laura 👑
    </div>

    <div class="mensaje" id="mensaje"></div>

    <img src="laura.jpg" class="foto">

    <div class="mensaje">
        Te mentiría si te dijera que no estás
        en cada uno de mis pensamientos.
    </div>

    <div class="final">
        Con amor, Bran ❤️
    </div>

</div>

<script>

/* corazones */

for(let i=0;i<35;i++){

    let c=document.createElement("div");

    c.className="corazon";
    c.innerHTML="❤";

    c.style.left=Math.random()*100+"vw";
    c.style.animationDuration=(5+Math.random()*8)+"s";
    c.style.animationDelay=Math.random()*10+"s";

    document.body.appendChild(c);
}

/* brillos */

for(let i=0;i<80;i++){

    let b=document.createElement("div");

    b.className="brillo";

    b.style.left=Math.random()*100+"vw";
    b.style.top=Math.random()*100+"vh";

    b.style.animationDelay=Math.random()*4+"s";

    document.body.appendChild(b);
}

<script>

const mensajes = [
"Te mentiría si te dijera que no estás en cada uno de mis pensamientos.",
"Desde que llegaste, mis días tienen un brillo diferente.",
"Tu sonrisa tiene el poder de alegrar cualquier momento.",
"Gracias por existir, Laura ❤️",
"Con amor, Bran."
];

let actual = 0;

function cambiarMensaje(){
    document.getElementById("mensaje").innerHTML = mensajes[actual];
    actual = (actual + 1) % mensajes.length;
}

cambiarMensaje();
setInterval(cambiarMensaje, 5000);

</script>

</body>
</html>
